version: 2

models:
  - name: int_actuals_monthly
    description: >
      Actuals rolled from order-line to product/customer/month grain. Effective
      unit price/cost are quantity-weighted. Feeds the forecast-vs-actuals variance model.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_code
              - customer_code
              - sales_month
    columns:
      - name: product_code
        tests: 
          - not_null
      - name: customer_code
        tests: 
          - not_null
      - name: sales_month
        tests:
         - not_null 