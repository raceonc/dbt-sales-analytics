version: 2

models:
  - name: stg_sales
    description: "Posted invoice data from ERP. Grain: one row per order line item
      by document date - unique combination of sop_number, product_code, doc_date"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sop_number
              - sop_line
              - scenario_code
    columns:
      - name: sop_number
        tests:
          - not_null
      - name: sop_line
        tests:
          - not_null
      - name: customer_code
        description: "Foreign key for customer dimension table"
        tests:
          - not_null
      - name: product_code
        description: "Foreign key for product dimension table. Combned with sop_number, defines the grain"
        tests:
          - not_null
      - name: scenario_code
        description: "Foreign key for scenarios dimension table"
      - name: quantity
        description: "Quantity of product sold."
      - name: unit_price
        description: "Price per unit at time of sale."
      - name: unit_cost
        description: "Standard cost per unit."
      - name: gross_sales
        description: "Quantity multiplied by unit price."
      - name: standard_cost_of_goods_sold
        description: "Quantity multiplied by unit cost."
      - name: gross_margin
        description: "Gross sales less standard cost of goods sold."

  - name: stg_sales_budget
    description: 
      "Budget data at product/customer/month grain. Grain: unique
      combination of product_code, customer_code, and budget_date
      (first day of month). Distinct grain from stg_sales — budget is
      planned at product/customer/month, actuals are transactional at
      order/line level. Not directly unioned; compared via a rollup layer."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_code
              - customer_code
              - budget_date
    columns:
      - name: product_code
        description: "Foreign key to the product dimension. Part of the grain."
        tests:
          - not_null
      - name: customer_code
        description: "Foreign key to the customer dimension. Part of the grain."
        tests:
          - not_null
      - name: budget_date
        description: "First day of the budget month. Part of the grain."
        tests:
          - not_null
      - name: bud_quantity
        description: "Budgeted quantity."
      - name: bud_unit_price
        description: "Budgeted price per unit."
      - name: bud_unit_cost
        description: "Budgeted cost per unit."
      - name: bud_gross_sales
        description: "Budgeted quantity multiplied by budgeted unit price."
      - name: bud_standard_cost
        description: "Budgeted quantity multiplied by budgeted unit cost."
      - name: bud_gross_margin
        description: "Budgeted gross sales less budgeted standard cost."

  - name: stg_customers
    description: "Customer dimension. Grain: one row per customer_code."
    columns:
        - name: customer_code
          description: "Unique customer identifier from the ERP. Primary key."
          tests:
            - not_null
            - unique
        - name: customer_name
          description: "Customer's display name."
        - name: customer_segment
          description: "Business segment the customer is classified under."
        - name: region
          description: "Geographic region the customer is assigned to."

  - name: stg_products
    description: "Product dimension. Grain: one row per product_code."
    columns:
        - name: product_code
          description: "Unique product identifier from the ERP. Primary key."
          tests:
            - not_null
            - unique
        - name: product_name
          description: "Product's display name."
        - name: product_category
          description: "Category the product is classified under."
        - name: unit_of_measure
          description: "Unit the product is sold/measured in (e.g. each, case, kg)."

  - name: stg_scenarios
    description:
      "Financial scenario for financial analysis"
    columns:
      - name: scenario_code
        tests:
          - not_null
          - unique