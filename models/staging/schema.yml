version: 2

models:
  - name: stg_sales
    description: "Posted invoice data from ERP. Grain: one row per order line item
     - unique combination of sop_number, product_code, doc_date"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sop_number
              - sop_line
              - scenario_code
    columns:
      - name: sop_number
        tests:
          - not_null
      - name: sop_line
        tests:
          - not_null
      - name: customer_code
        description: "Foreign key for customer dimension table"
        tests:
          - not_null
      - name: product_code
        description: "Foreign key for product dimension table. Combned with sop_number, defines the grain"
        tests:
          - not_null
      - name: scenario_code
        description: "Foreign key for scenarios dimension table"
      - name: quantity
        description: "Quantity of product sold."
      - name: unit_price
        description: "Price per unit at time of sale."
      - name: unit_cost
        description: "Standard cost per unit."
      - name: gross_sales
        description: "Quantity multiplied by unit price."
      - name: standard_cost_of_goods_sold
        description: "Quantity multiplied by unit cost."
      - name: gross_margin
        description: "Gross sales less standard cost of goods sold."

  - name: stg_sales_stepped_fc
    description: >
      Periodic snapshot fact for the IBP forecast cycle. Grain: one row per
      product_code / customer_code / snapshot_date / forecast_month. Each weekly
      upload re-forecasts forward months; is_locked marks the committed consensus
      snapshot (the locked step, one day after supply review).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_code
              - customer_code
              - snapshot_date
              - forecast_month
    columns:
      - name: product_code
        description: "FK to product dimension. Part of the grain."
        tests:
          - not_null
      - name: customer_code
        description: "FK to customer dimension. Part of the grain."
        tests:
          - not_null
      - name: snapshot_date
        description: "Date the forecast was uploaded; identifies the snapshot version. Part of the grain."
        tests:
          - not_null
      - name: forecast_month
        description: "Month being forecast (first of month). Part of the grain."
        tests:
          - not_null
      - name: fc_quantity
        description: "Forecast quantity."
        tests:
          - not_null
      - name: fc_unit_price
        description: "Forecast price per unit."
      - name: fc_unit_cost
        description: "Forecast cost per unit. Meant to track actuals; drift here is the traceability problem the project targets."
      - name: fc_gross_sales
        description: "fc_quantity multiplied by fc_unit_price."
      - name: fc_standard_cost
        description: "fc_quantity multiplied by fc_unit_cost."
      - name: fc_gross_margin
        description: "fc_gross_sales less fc_standard_cost."
      - name: is_locked
        description: >
          True on the committed consensus snapshot (locked step after supply
          review). False for demand-review, pre-lock, and finance snapshots.
        tests:
          - not_null
      - name: scenario_code
        description: "Scenario tag. Always 'FCST' for this source."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['FCST']

  - name: stg_sales_budget
    description: 
      "Budget data at product/customer/month grain. Grain: unique
      combination of product_code, customer_code, and budget_date
      (first day of month). Distinct grain from stg_sales — budget is
      planned at product/customer/month, actuals are transactional at
      order/line level. Not directly unioned; compared via a rollup layer."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_code
              - customer_code
              - budget_date
    columns:
      - name: product_code
        description: "Foreign key to the product dimension. Part of the grain."
        tests:
          - not_null
      - name: customer_code
        description: "Foreign key to the customer dimension. Part of the grain."
        tests:
          - not_null
      - name: budget_date
        description: "First day of the budget month. Part of the grain."
        tests:
          - not_null
      - name: bud_quantity
        description: "Budgeted quantity."
      - name: bud_unit_price
        description: "Budgeted price per unit."
      - name: bud_unit_cost
        description: "Budgeted cost per unit."
      - name: bud_gross_sales
        description: "Budgeted quantity multiplied by budgeted unit price."
      - name: bud_standard_cost
        description: "Budgeted quantity multiplied by budgeted unit cost."
      - name: bud_gross_margin
        description: "Budgeted gross sales less budgeted standard cost."

      - name: standard_cost_of_goods_sold
        description: "Quantity multiplied by unit cost."
      - name: gross_margin
        description: "Gross sales less standard cost of goods sold."

  - name: stg_sales_plan
    description: 
      "plan data at product/customer/month grain. Grain: unique
      combination of product_code, customer_code, and plan_date
      (first day of month). Distinct grain from stg_sales — plan is
      planned at product/customer/month, actuals are transactional at
      order/line level. Not directly unioned; compared via a rollup layer."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_code
              - customer_code
              - plan_date
    columns:
      - name: product_code
        description: "Foreign key to the product dimension. Part of the grain."
        tests:
          - not_null
      - name: customer_code
        description: "Foreign key to the customer dimension. Part of the grain."
        tests:
          - not_null
      - name: plan_date
        description: "First day of the plan month. Part of the grain."
        tests:
          - not_null
      - name: plan_quantity
        description: "planed quantity."
      - name: plan_unit_price
        description: "planed price per unit."
      - name: plan_unit_cost
        description: "planed cost per unit."
      - name: plan_gross_sales
        description: "planed quantity multiplied by planed unit price."
      - name: plan_standard_cost
        description: "planed quantity multiplied by planed unit cost."
      - name: plan_gross_margin
        description: "planed gross sales less planed standard cost."

  - name: stg_customers
    description: "Customer dimension. Grain: one row per customer_code."
    columns:
        - name: customer_code
          description: "Unique customer identifier from the ERP. Primary key."
          tests:
            - not_null
            - unique
        - name: customer_name
          description: "Customer's display name."
        - name: customer_segment
          description: "Business segment the customer is classified under."
        - name: region
          description: "Geographic region the customer is assigned to."

  - name: stg_products
    description: "Product dimension. Grain: one row per product_code."
    columns:
        - name: product_code
          description: "Unique product identifier from the ERP. Primary key."
          tests:
            - not_null
            - unique
        - name: product_name
          description: "Product's display name."
        - name: product_category
          description: "Category the product is classified under."
        - name: unit_of_measure
          description: "Unit the product is sold/measured in (e.g. each, case, kg)."

  - name: stg_scenarios
    description:
      "Financial scenario for financial analysis"
    columns:
      - name: scenario_code
        tests:
          - not_null
          - unique