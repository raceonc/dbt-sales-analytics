version: 2

models:
  - name: fct_sales
    description: >
      Sales fact table. Grain: one row per order line item per scenario —
      unique combination of sop_number, sop_line, and scenario_code.
      Conforms stg_sales to customer, product, and scenario dimensions via
      left joins on unique-tested dimension keys, so the join layer cannot
      fan out rows beyond the staging grain.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sop_number
              - sop_line
              - scenario_code
    columns:
      - name: sop_number
        description: "Order number from the ERP. Part of the grain."
        tests:
          - not_null
      - name: sop_line
        description: "Line sequence number within the order. Part of the grain."
        tests:
          - not_null
      - name: transaction_date
        description: "Date the transaction was posted."
      - name: customer_code
        description: "Foreign key to the customer dimension."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_code
      - name: customer_name
        description: "Customer's display name, from the customer dimension."
      - name: customer_segment
        description: "Business segment the customer is classified under."
      - name: region
        description: "Geographic region the customer is assigned to."
      - name: product_code
        description: "Foreign key to the product dimension."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_code
      - name: product_name
        description: "Product's display name, from the product dimension."
      - name: product_category
        description: "Category the product is classified under."
      - name: scenario_code
        description: "Foreign key to the scenario dimension. Part of the grain. Currently ACT only — designed to extend to future actuals-side scenarios."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_scenarios')
                field: scenario_code
      - name: scenario_name
        description: "Scenario's display name, from the scenario dimension."
      - name: scenario_type
        description: "Classification of the scenario type."
      - name: quantity
        description: "Quantity of product sold."
      - name: unit_price
        description: "Price per unit at time of sale."
      - name: unit_cost
        description: "Standard cost per unit."
      - name: gross_sales
        description: "Quantity multiplied by unit price."
      - name: standard_cost
        description: "Quantity multiplied by unit cost."
      - name: gross_margin
        description: "Gross sales less standard cost of goods sold."
  - name: fct_forecast_vs_actuals
    description: >
      Joins the latest locked forecast to realized actuals at
      product/customer/month and exposes qty/price/cost variance. For testing forecast assumptions that
      drift from actuals surface here as a named
      number instead of hiding in an aggregate. Full outer join — a forecast with no
      actual (predicted sale that didn't land) and an actual with no forecast (sale
      nobody saw coming) are both real variance cases and both are kept.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_code
              - customer_code
              - month
    columns:
      - name: product_code
        description: "Product. Part of the grain. Coalesced across both sides of the outer join."
        tests:
          - not_null
      - name: customer_code
        description: "Customer. Part of the grain. Coalesced across both sides."
        tests:
          - not_null
      - name: month
        description: "Month being compared (first of month). Part of the grain. Coalesced from forecast_month / sales_month."
        tests:
          - not_null
      - name: fc_quantity
        description: "Forecast quantity from the latest locked snapshot."
      - name: fc_unit_price
        description: "Forecast unit price, latest locked snapshot."
      - name: fc_unit_cost
        description: "Forecast unit cost, latest locked snapshot. The value that drifts in the Feb cycle."
      - name: act_quantity
        description: "Realized quantity, actuals rolled to month."
      - name: act_unit_price
        description: "Realized unit price, quantity-weighted."
      - name: act_unit_cost
        description: "Realized unit cost, quantity-weighted."
      - name: qty_variance
        description: "act_quantity minus fc_quantity. Positive = sold more than forecast."
      - name: price_variance
        description: "act_unit_price minus fc_unit_price."
      - name: cost_variance
        description: "act_unit_cost minus fc_unit_cost. The −3 on PROD-001/CUST-A March is the seeded drift, caught."